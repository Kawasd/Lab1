<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Тестова сторінка</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .test-section {
            padding: 20px;
            margin: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .my-image {
            max-width: 300px;
            border-radius: 20px;
            border: 3px solid #3498db;
        }
    </style>
</head>
<body>

    <nav>
        <ul>
            <li><a href="index.html">На головну</a></li>
        </ul>
    </nav>

    <div class="test-section">
        <h2>1. Тест зображення</h2>
        <img src="img/foto.jpg" alt="Моє тестове фото" class="my-image">
        <p>Якщо картинка не з'явилася, перевірте, чи завантажили ви її в папку img.</p>
    </div>

    <div class="test-section">
        <h2>2. Тест музики</h2>
        <p>Спробуйте додати аудіо (потрібен файл .mp3 у папці audio):</p>
        <audio controls>
            <source src="audio/test-music.mp3" type="audio/mpeg">
            Ваш браузер не підтримує аудіо.
        </audio>
    </div>

</body>
</html>
